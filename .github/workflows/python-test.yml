name: TaskFlow Python CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  quality-and-tests:

    name: Vérification qualité et tests

    runs-on: ubuntu-latest

    steps:

      - name: Récupération du projet
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Vérification du style avec Ruff
        run: |
          ruff check .

      - name: Vérification du formatage
        run: |
          ruff format --check .

      - name: Exécution des tests automatisés
        run: |
          pytest -v