name: TaskFlow Python CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  quality-and-tests:

    name: Vérification qualité et tests

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Récupération du projet
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Vérification du style avec Ruff
        run: |
          ruff check .

      - name: Vérification du formatage
        run: |
          ruff format --check .

      - name: Exécution des tests automatisés
        run: |
          pytest -v

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construction de l'image Docker
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/taskflow:latest .

      - name: Publication de l'image Docker
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/taskflow:latest